<!DOCTYPE html>
<html lang="pt-BR">
<head>
  
  <title>Sistema Acadêmico</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 350px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .aprovado {
      color: blue;
    }

    .exame {
      color: green;
    }

    .reprovado {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Sistema Academico</h1>

    <div class="campo">
      <label for="nome">Nome do Aluno</label>
      <input type="text" id="nome">
    </div>

    <div class="campo">
      <label for="nota1">Nota 1</label>
      <input type="number" id="nota1" step="0.1">
    </div>

    <div class="campo">
      <label for="nota2">Nota 2</label>
      <input type="number" id="nota2" step="0.1">
    </div>

    <div class="campo">
      <label for="nota3">Nota 3</label>
      <input type="number" id="nota3" step="0.1">
    </div>

    <button id="calcular">Calcular Media</button>

    <div id="resultado"></div>

  </div>
     <script src="script3.js"></script>
</body>
</html>
