<!DOCTYPE html>
<html lang="pt-BR">
<head>
 
  <title>Conversor de Temperatura</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Conversor de temperatura</h1>

    <div class="campo">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" "step="0.1">
    </div>

    <div class="campo">
      <label for="fahrenheit">Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" "step="0.1">
    </div>
  </div>
  <script src="script2.js"></script>
  </body>
  </html>
