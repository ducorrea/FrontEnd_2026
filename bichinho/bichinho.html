<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Pet Virtual</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 

  </head>

<body style="
    background-image: url('bg_d.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;"
    class="bg-pink-50 min-h-screen flex flex-col">

    <div id="overlay"></div>

    <div class="flex flex-col items-center w-full px-4">
        <img 
            id="b"
            src="b_n.png"
            alt="Imagem principal"
            class="w-full max-w-md h-auto"
        />
    </div>
    
    <div class="mt-12 flex justify-center w-full">
        <img 
            id="btn"
            src="b_c.png"
            alt="Botão"
            class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"
            onclick="alimentar()"
        />
    </div>

    <div class="w-full flex items-center justify-start p-4 gap-4">
        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="b_come.png" />
            </div>
        </div>

        <input 
            type="text" 
            placeholder="Nome da criatura..." 
            class="input input-secondary"
        />
    </div>

    <div class="mt-12 flex justify-center w-full"> 
        <input
            type="checkbox"
            id="toggleTema"
            class="toggle toggle-lg border-orange-500 bg-orange-400 text-orange-800 checked:border-indigo-600 checked:bg-indigo-500 "
        />
    </div>

    <script src="script.js"></script>

</body>
</html>
